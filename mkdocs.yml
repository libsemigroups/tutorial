site_name: The Semigroups package - Zero to ε

nav:
  - Home: index.md
  - Semigroups:
      - gap/index.md
      - Installation: gap/install.md
      - "The GAP Session": gap/session.md
      - "Worksheet 1: Analysis of finite semigroups": gap/worksheet1.md
      - "Worksheet 2: Analysis of finitely presented semigroups": gap/worksheet2.md
  - libsemigroups_pybind11:
      - libsemigroups_pybind11/index.md
  - minizinc:
      - minizinc/index.md

theme:
  name: material
  logo: images/logo.svg
  favicon: images/favicon.png
  palette:
    - scheme: default
      primary: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.path
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.integrate
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips

plugins:
  # - optimize
  # - privacy
  - search

markdown_extensions:
  - footnotes
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      use_pygments: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.keys
  - pymdownx.arithmatex:
      generic: true

copyright: Copyright &copy; 2026 James Mitchell, Reinis Cirpons and Joe Edwards

extra:
  social:
    - name: The Semigroups package
      icon: fontawesome/brands/github
      link: https://www.github.com/semigroups/Semigroups
    - name: The libsemigroups_pybind11 project
      icon: fontawesome/brands/github
      link: https://www.github.com/libsemigroups/libsemigroups_pybind11

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
